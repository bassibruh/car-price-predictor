<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .main-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 750px;
            width: 100%;
        }

        .header-section h1 {
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header-section p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .form-label {
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label i {
            color: #38bdf8;
        }

        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            color: #ffffff;
        }

        .form-select option {
            background: #1e293b;
            color: #fff;
        }

        .btn-predict {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .result-container {
            margin-top: 30px;
            display: none;
        }

        .result-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .result-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: #4ade80;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="main-card">
        
        <div class="header-section text-center mb-4">
            <h1>Car Price Predictor</h1>
            <p>Enter your car details below to get an instant AI-powered market valuation.</p>
        </div>

        <form method="post" accept-charset="utf-8" name="Modelform">
            <div class="row g-3">
                
                <div class="col-md-6">
                    <label class="form-label" for="company"><i class="fa-solid fa-building"></i> Company Name</label>
                    <select class="form-select" id="company" name="company" required onchange="load_car_models(this.id,'car_models')">
                        <option value="" disabled selected>Select Company</option>
                        {% for company in companies %}
                        <option value="{{ company }}">{{ company }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="car_models"><i class="fa-solid fa-car"></i> Car Model</label>
                    <select class="form-select" id="car_models" name="car_models" required>
                        <option value="" disabled selected>Select Model</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="year"><i class="fa-solid fa-calendar-days"></i> Year of Purchase</label>
                    <select class="form-select" id="year" name="year" required>
                        <option value="" disabled selected>Select Year</option>
                        {% for year in years %}
                        <option value="{{ year }}">{{ year }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="fuel_type"><i class="fa-solid fa-gas-pump"></i> Fuel Type</label>
                    <select class="form-select" id="fuel_type" name="fuel_type" required>
                        <option value="" disabled selected>Select Fuel Type</option>
                        {% for fuel in fuel_types %}
                        <option value="{{ fuel }}">{{ fuel }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label" for="kilo_driven"><i class="fa-solid fa-gauge"></i> Kilometres Driven</label>
                    <input type="number" class="form-control" id="kilo_driven" name="kilo_driven" placeholder="e.g., 45000" required>
                </div>

                <div class="col-12 mt-4">
                    <button type="button" class="btn btn-predict w-100" onclick="send_data()">
                        <i class="fa-solid fa-wand-magic-sparkles me-2"></i> Predict Price
                    </button>
                </div>
            </div>
        </form>

        <div class="result-container" id="resultDiv">
            <div class="result-box">
                <div class="result-title" id="prediction_status">Estimated Value</div>
                <div class="result-value" id="prediction">₹0.00</div>
            </div>
        </div>

    </div>
</div>

<script>
    function load_car_models(company_id, car_model_id) {
        var company = document.getElementById(company_id);
        var car_model = document.getElementById(car_model_id);
        
        car_model.value = "";
        car_model.innerHTML = '<option value="" disabled selected>Select Model</option>';
        
        {% for company in companies %}
            if (company.value == "{{ company }}") {
                {% for model in car_models %}
                    {% if company in model %}
                        var newOption = document.createElement("option");
                        newOption.value = "{{ model }}";
                        newOption.innerHTML = "{{ model }}";
                        car_model.options.add(newOption);
                    {% endif %}
                {% endfor %}
            }
        {% endfor %}
    }

    function send_data() {
        const form = document.querySelector('form');
        
        if(!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        var fd = new FormData(form);
        var xhr = new XMLHttpRequest();

        xhr.open('POST', '/predict', true);
        
        document.getElementById('resultDiv').style.display = "block";
        document.getElementById('prediction_status').innerHTML = "Processing...";
        document.getElementById('prediction').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Calculating...';
        document.getElementById('prediction').style.color = "#38bdf8";

        xhr.onreadystatechange = function() {
            if (xhr.readyState == XMLHttpRequest.DONE) {
                document.getElementById('prediction_status').innerHTML = "Estimated Valuation";
                let formattedPrice = parseFloat(xhr.responseText).toLocaleString('en-IN');
                document.getElementById('prediction').innerHTML = "₹ " + formattedPrice;
                document.getElementById('prediction').style.color = "#4ade80";
            }
        };

        xhr.send(fd);
    }
</script>

</body>
</html>
